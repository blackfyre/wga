[tools]
bun = "latest"
go = "1.26.5"
"go:github.com/a-h/templ/cmd/templ" = "v0.3.1020"
"go:github.com/air-verse/air" = "latest"
"http:mailpit" = { version = "1.30.4", url = "https://github.com/axllent/mailpit/releases/download/v{{ version }}/mailpit-linux-amd64.tar.gz", bin = "mailpit", checksum = "sha256:e9c104154c22b83ac4c7d19f9d665a5c933585a3caafcd790805d732fa8d03fb" }
"github:golangci/golangci-lint" = "latest"
"aqua:superfly/flyctl" = "latest"
sqlite = "latest"

# Git is a system prerequisite because Mise has no cross-platform Git backend.
[env]
WGA_ENV = "development"
WGA_S3_BUCKET = "wga-assets"
WGA_S3_REGION = "garage"
WGA_S3_ACCESS_KEY = "GKlocaluploads"
WGA_S3_ACCESS_SECRET = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
WGA_S3_ENDPOINT = "http://127.0.0.1:3900"
WGA_ADMIN_EMAIL = "" # optional bootstrap admin email address
WGA_ADMIN_PASSWORD = "" # optional bootstrap admin password
WGA_PROTOCOL = "http" # http or https
WGA_HOSTNAME = "localhost:8090" # hostname (and port)
WGA_SMTP_HOST = "127.0.0.1" # smtp server
WGA_SMTP_PORT = "1025" # Mailpit SMTP port
WGA_SMTP_USERNAME = "" # smtp username
WGA_SMTP_PASSWORD = "" # smtp password
WGA_SENDER_ADDRESS = "do-not-reply@wga.hu" # sender email address
WGA_SENDER_NAME = "WGA" # sender name
WGA_POSTCARD_FREQUENCY = "*/1 * * * *"
MAILPIT_URL = "http://127.0.0.1:8025" # Mailpit HTTP endpoint

[tasks."app:versions"]
description = "Print versions of the core development tools."
run = ["bun --version", "git --version", "go version"]

[tasks."app:generate-templates"]
description = "Generate Go templates from templ sources."
run = "templ generate"

[tasks."app:tidy-modules"]
description = "Run go mod tidy to sync module dependencies."
run = "go mod tidy"

[tasks."app:tidy"]
description = "Regenerate templates and tidy Go modules."
run = ["mise run app:generate-templates", "mise run app:tidy-modules"]

[tasks."app:build"]
description = "Produce the dist binary with fresh assets and dependencies."
run = [
  "mkdir -p dist",
  "rm -rf dist/wga",
  "bun install",
  "bun run build",
  "mise run app:tidy",
  "go build -v -o dist/wga ./cmd/wga",
]

[tasks."app:run"]
description = "Run the built server binary in development mode."
dir = "dist"
run = "./wga serve --dev"

[tasks."app:reset"]
description = "Rebuild, reset local data, start Garage if needed, and restart the development server."
run = '''
mise run app:build || exit $?
rm -rf dist/wga_data

podman compose up -d garage || exit $?
for _ in $(seq 1 30); do
  if curl --fail --silent --show-error http://127.0.0.1:3903/health >/dev/null; then
    break
  fi
  sleep 1
done
curl --fail --silent --show-error http://127.0.0.1:3903/health >/dev/null || exit $?
mise run app:run
'''

[tasks."app:reboot"]
description = "Rebuild and restart the development server."
run = ["mise run app:build", "mise run app:run"]

[tasks."app:init-env"]
description = "Bootstrap a local environment file from the example."
run = "cp .env.example .env"

[tasks."code:run"]
description = "Run the application in development mode without building."
run = "go run ./cmd/wga --dev"

# Run this before commits; Mise does not install Git hooks itself.
[tasks."check:govet"]
description = "Run go vet."
run = "go vet ./..."

[tasks."check:golangci-lint"]
description = "Run golangci-lint."
run = "golangci-lint run"

[tasks.check]
description = "Run the checks previously provided by the Git hooks."
depends = ["check:govet", "check:golangci-lint"]

[tasks."watch:js"]
description = "Watch and build JavaScript assets."
run = "bun run build:watch:js"

[tasks."watch:templ"]
description = "Watch and generate Go templates."
run = "templ generate --watch"

[tasks."watch:css"]
description = "Watch and build CSS assets."
run = "bun run build:watch:css"

[tasks."services:up"]
description = "Start local Mailpit and Garage services with Podman Compose."
run = "podman compose up -d"

[tasks.dev]
description = "Start local services, asset watchers, and template generation."
alias = "up"
run = "mise run services:up && mise run --jobs 3 watch:js ::: watch:templ ::: watch:css"
